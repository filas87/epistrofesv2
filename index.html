<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Έλεγχος Επιστροφής</title>

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    .wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 16px;
    }

    .card {
      background: #ffffff;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 14px;
      text-align: center;
      font-size: 28px;
    }

    .info {
      background: #eef2ff;
      border: 1px solid #c7d2fe;
      padding: 12px 14px;
      border-radius: 12px;
      margin-bottom: 16px;
      line-height: 1.5;
      font-size: 15px;
    }

    .upload-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 14px;
    }

    .file-label {
      background: #2563eb;
      color: #fff;
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      display: inline-block;
    }

    .file-label input {
      display: none;
    }

    .file-name {
      font-size: 14px;
      color: #374151;
      word-break: break-word;
    }

    .top-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }

    .mini-box {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px;
      font-size: 15px;
    }

    .mini-box strong {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: #374151;
    }

    input[type="text"] {
      width: 100%;
      height: 60px;
      border: 2px solid #cbd5e1;
      border-radius: 14px;
      padding: 0 16px;
      font-size: 24px;
      outline: none;
      text-transform: uppercase;
    }

    input[type="text"]:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-main {
      background: #2563eb;
      color: #fff;
    }

    .btn-light {
      background: #e5e7eb;
      color: #111827;
    }

    .result {
      margin-top: 18px;
      min-height: 140px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 42px;
      font-weight: bold;
      border: 2px dashed #d1d5db;
      background: #f9fafb;
      padding: 18px;
    }

    .neutral {
      background: #f9fafb;
      color: #374151;
      border: 2px dashed #d1d5db;
    }

    .yes {
      background: #dcfce7;
      color: #166534;
      border: 2px solid #86efac;
    }

    .no {
      background: #fee2e2;
      color: #991b1b;
      border: 2px solid #fca5a5;
    }

    .details {
      margin-top: 14px;
      text-align: center;
      font-size: 18px;
      word-break: break-word;
    }

    .history {
      margin-top: 22px;
    }

    .history h2 {
      font-size: 20px;
      margin: 0 0 10px;
    }

    .history-list {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid #e5e7eb;
      font-size: 15px;
    }

    .history-item:last-child {
      border-bottom: none;
    }

    .ok {
      color: #166534;
      font-weight: bold;
    }

    .bad {
      color: #991b1b;
      font-weight: bold;
    }

    .small {
      color: #6b7280;
      font-size: 13px;
    }

    @media (max-width: 700px) {
      .top-grid {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 24px;
      }

      .result {
        font-size: 34px;
        min-height: 120px;
      }

      .history-item {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Έλεγχος Επιστροφής</h1>

      <div class="info">
        Φόρτωσε αρχείο Excel με tracking numbers και μετά σκάναρε ή γράψε έναν κωδικό για να δεις αν είναι επιστροφή.
      </div>

      <div class="upload-row">
        <label class="file-label">
          Φόρτωση Excel
          <input type="file" id="excelFile" accept=".xlsx,.xls,.csv" />
        </label>
        <div class="file-name" id="fileName">Δεν έχει φορτωθεί αρχείο.</div>
      </div>

      <div class="top-grid">
        <div class="mini-box">
          <strong>Πλήθος tracking numbers</strong>
          <div id="countBox">0</div>
        </div>

        <div class="mini-box">
          <strong>Τελευταίο scan buffer</strong>
          <div id="liveBuffer">—</div>
        </div>
      </div>

      <input
        id="scanInput"
        type="text"
        placeholder="Σκάναρε ή γράψε tracking number"
        autocomplete="off"
        autocapitalize="characters"
        spellcheck="false"
      />

      <div class="buttons">
        <button class="btn-main" id="checkBtn">Έλεγχος</button>
        <button class="btn-light" id="clearBtn">Καθαρισμός</button>
        <button class="btn-light" id="focusBtn">Εστίαση</button>
      </div>

      <div id="resultBox" class="result neutral">Φόρτωσε Excel και μετά σκάναρε</div>
      <div id="details" class="details"></div>

      <div class="history">
        <h2>Τελευταία scans</h2>
        <div id="historyList" class="history-list">
          <div class="history-item small">Δεν υπάρχουν scans ακόμα.</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let trackingNumbers = new Set();

    const excelFile = document.getElementById("excelFile");
    const fileName = document.getElementById("fileName");
    const countBox = document.getElementById("countBox");

    const scanInput = document.getElementById("scanInput");
    const resultBox = document.getElementById("resultBox");
    const details = document.getElementById("details");
    const historyList = document.getElementById("historyList");
    const liveBuffer = document.getElementById("liveBuffer");

    const checkBtn = document.getElementById("checkBtn");
    const clearBtn = document.getElementById("clearBtn");
    const focusBtn = document.getElementById("focusBtn");

    let historyItems = [];
    let wedgeBuffer = "";
    let wedgeTimer = null;

    function normalizeCode(value) {
      return String(value || "")
        .replace(/\s+/g, "")
        .trim()
        .toUpperCase();
    }

    function updateCount() {
      countBox.textContent = trackingNumbers.size;
    }

    function focusInput() {
      scanInput.focus();
      scanInput.select();
    }

    function setNeutral(text) {
      resultBox.className = "result neutral";
      resultBox.textContent = text;
    }

    function clearInput() {
      scanInput.value = "";
      wedgeBuffer = "";
      liveBuffer.textContent = "—";
      details.textContent = "";
      setNeutral("Φόρτωσε Excel και μετά σκάναρε");
      focusInput();
    }

    function renderHistory() {
      if (historyItems.length === 0) {
        historyList.innerHTML = '<div class="history-item small">Δεν υπάρχουν scans ακόμα.</div>';
        return;
      }

      historyList.innerHTML = historyItems.map(item => `
        <div class="history-item">
          <div><strong>${item.code}</strong></div>
          <div>
            <span class="${item.found ? 'ok' : 'bad'}">
              ${item.found ? 'ΕΠΙΣΤΡΟΦΗ' : 'ΟΧΙ ΕΠΙΣΤΡΟΦΗ'}
            </span>
            <span class="small"> — ${item.time}</span>
          </div>
        </div>
      `).join("");
    }

    function addHistory(code, found) {
      const time = new Date().toLocaleTimeString("el-GR");
      historyItems.unshift({ code, found, time });

      if (historyItems.length > 15) {
        historyItems.length = 15;
      }

      renderHistory();
    }

    function showResult(code) {
      const normalized = normalizeCode(code);

      if (!normalized) {
        setNeutral("Δώσε ή σκάναρε κωδικό");
        details.textContent = "";
        return;
      }

      if (trackingNumbers.size === 0) {
        setNeutral("Φόρτωσε πρώτα Excel");
        details.textContent = "Δεν έχει φορτωθεί λίστα tracking numbers.";
        return;
      }

      const found = trackingNumbers.has(normalized);

      if (found) {
        resultBox.className = "result yes";
        resultBox.textContent = "ΕΠΙΣΤΡΟΦΗ";
      } else {
        resultBox.className = "result no";
        resultBox.textContent = "ΟΧΙ ΕΠΙΣΤΡΟΦΗ";
      }

      details.textContent = "Tracking Number: " + normalized;
      addHistory(normalized, found);

      scanInput.value = "";
      wedgeBuffer = "";
      liveBuffer.textContent = "—";
      focusInput();
    }

    function checkCode() {
      const code = normalizeCode(scanInput.value || wedgeBuffer);
      showResult(code);
    }

    function looksLikeTracking(code) {
      return /^[A-Z]{2}[A-Z0-9]{9,}[A-Z]{2}$/.test(code) || /^[A-Z0-9]{10,}$/.test(code);
    }

    function loadTrackingFromRows(rows) {
      const foundCodes = [];

      for (const row of rows) {
        if (!row) continue;

        if (Array.isArray(row)) {
          for (const cell of row) {
            const code = normalizeCode(cell);
            if (looksLikeTracking(code)) {
              foundCodes.push(code);
            }
          }
        } else if (typeof row === "object") {
          for (const key in row) {
            const code = normalizeCode(row[key]);
            if (looksLikeTracking(code)) {
              foundCodes.push(code);
            }
          }
        }
      }

      trackingNumbers = new Set(foundCodes);
      updateCount();

      if (trackingNumbers.size > 0) {
        setNeutral("Το Excel φορτώθηκε");
        details.textContent = "Φορτώθηκαν " + trackingNumbers.size + " tracking numbers.";
      } else {
        setNeutral("Δεν βρέθηκαν tracking numbers");
        details.textContent = "Έλεγξε αν το Excel έχει σωστή στήλη με tracking numbers.";
      }
    }

    excelFile.addEventListener("change", function (e) {
      const file = e.target.files[0];
      if (!file) return;

      fileName.textContent = file.name;

      const reader = new FileReader();

      reader.onload = function (event) {
        try {
          const data = new Uint8Array(event.target.result);
          const workbook = XLSX.read(data, { type: "array" });

          const firstSheetName = workbook.SheetNames[0];
          const sheet = workbook.Sheets[firstSheetName];

          const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
          loadTrackingFromRows(rows);
          focusInput();
        } catch (error) {
          trackingNumbers = new Set();
          updateCount();
          setNeutral("Σφάλμα φόρτωσης");
          details.textContent = "Δεν μπόρεσα να διαβάσω το αρχείο Excel.";
        }
      };

      reader.readAsArrayBuffer(file);
    });

    checkBtn.addEventListener("click", checkCode);
    clearBtn.addEventListener("click", clearInput);
    focusBtn.addEventListener("click", focusInput);

    scanInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        e.preventDefault();
        checkCode();
      }
    });

    scanInput.addEventListener("input", function () {
      const code = normalizeCode(scanInput.value);
      liveBuffer.textContent = code || "—";

      clearTimeout(wedgeTimer);
      wedgeTimer = setTimeout(function () {
        if (code.length >= 10) {
          showResult(code);
        }
      }, 150);
    });

    document.addEventListener("keydown", function (e) {
      const activeIsInput = document.activeElement === scanInput;

      if (activeIsInput) return;

      if (e.key === "Enter") {
        if (wedgeBuffer.length > 0) {
          e.preventDefault();
          showResult(wedgeBuffer);
        }
        return;
      }

      if (e.key.length === 1) {
        wedgeBuffer += e.key;
        liveBuffer.textContent = normalizeCode(wedgeBuffer) || "—";

        clearTimeout(wedgeTimer);
        wedgeTimer = setTimeout(function () {
          const code = normalizeCode(wedgeBuffer);
          if (code.length >= 10) {
            showResult(code);
          }
        }, 150);
      }
    });

    document.addEventListener("click", function () {
      focusInput();
    });

    window.addEventListener("load", function () {
      updateCount();
      focusInput();
      setNeutral("Φόρτωσε Excel και μετά σκάναρε");
    });
  </script>
</body>
</html>
