<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Έλεγχος Επιστροφής Zebra</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 16px;
    }

    .card {
      background: #ffffff;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin: 0 0 14px;
      text-align: center;
      font-size: 28px;
    }

    .info {
      background: #eef2ff;
      border: 1px solid #c7d2fe;
      padding: 12px 14px;
      border-radius: 12px;
      margin-bottom: 16px;
      line-height: 1.5;
      font-size: 15px;
    }

    .status-bar {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .mini-box {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px;
      font-size: 15px;
    }

    .mini-box strong {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: #374151;
    }

    input[type="text"] {
      width: 100%;
      height: 60px;
      border: 2px solid #cbd5e1;
      border-radius: 14px;
      padding: 0 16px;
      font-size: 24px;
      outline: none;
      text-transform: uppercase;
    }

    input[type="text"]:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37,99,235,0.12);
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-main {
      background: #2563eb;
      color: #fff;
    }

    .btn-light {
      background: #e5e7eb;
      color: #111827;
    }

    .result {
      margin-top: 18px;
      min-height: 140px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 42px;
      font-weight: bold;
      border: 2px dashed #d1d5db;
      background: #f9fafb;
      padding: 18px;
    }

    .neutral {
      background: #f9fafb;
      color: #374151;
      border: 2px dashed #d1d5db;
    }

    .yes {
      background: #dcfce7;
      color: #166534;
      border: 2px solid #86efac;
    }

    .no {
      background: #fee2e2;
      color: #991b1b;
      border: 2px solid #fca5a5;
    }

    .details {
      margin-top: 14px;
      text-align: center;
      font-size: 18px;
      word-break: break-word;
    }

    .history {
      margin-top: 22px;
    }

    .history h2 {
      font-size: 20px;
      margin: 0 0 10px;
    }

    .history-list {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid #e5e7eb;
      font-size: 15px;
    }

    .history-item:last-child {
      border-bottom: none;
    }

    .ok {
      color: #166534;
      font-weight: bold;
    }

    .bad {
      color: #991b1b;
      font-weight: bold;
    }

    .small {
      color: #6b7280;
      font-size: 13px;
    }

    @media (max-width: 600px) {
      h1 { font-size: 24px; }
      .result { font-size: 34px; min-height: 120px; }
      .history-item { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Έλεγχος Επιστροφής</h1>

      <div class="info">
        Zebra scanner mode: το πρόγραμμα δέχεται scan είτε μέσα στο πεδίο είτε γενικά σαν πληκτρολόγιο.
      </div>

      <div class="status-bar">
        <div class="mini-box">
          <strong>Τελευταίο scan buffer</strong>
          <div id="liveBuffer">—</div>
        </div>
      </div>

      <input
        id="scanInput"
        type="text"
        placeholder="Σκάναρε ή γράψε tracking number"
        autocomplete="off"
        autocapitalize="characters"
        spellcheck="false"
      />

      <div class="buttons">
        <button class="btn-main" id="checkBtn">Έλεγχος</button>
        <button class="btn-light" id="clearBtn">Καθαρισμός</button>
        <button class="btn-light" id="focusBtn">Εστίαση</button>
        <button class="btn-light" id="testBtn">Τεστ JavaScript</button>
      </div>

      <div id="resultBox" class="result neutral">Περίμενω scan...</div>
      <div id="details" class="details"></div>

      <div class="history">
        <h2>Τελευταία scans</h2>
        <div id="historyList" class="history-list">
          <div class="history-item small">Δεν υπάρχουν scans ακόμα.</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const trackingNumbers = new Set([
      "NB421145386GR","NB421442693GR","NB421445329GR","NB421490067GR","NB421501428GR",
      "NB421501811GR","NB421503830GR","NB421506371GR","NB421410280GR","NB421448815GR",
      "NB421557886GR","NB421567035GR","NB421628980GR","NB421631935GR","NB421688524GR",
      "NB421442367GR","NB421551795GR","NB421695701GR","NB421809219GR","NB421843691GR",
      "NB421890895GR","NB422092296GR","NB422356815GR","NB422356885GR","NB422362943GR",
      "NB422363229GR","NB422367353GR","NB422451095GR","NB422481061GR","NB422550907GR",
      "NB422550915GR","NB422571685GR","NB422584914GR","NB422584928GR","NB422372628GR",
      "NB422411825GR","NB422446864GR","NB422446918GR","NB422447309GR","NB422550924GR",
      "NB422551258GR","NB422581453GR","NB422624410GR","NB422633221GR","NB422780193GR",
      "NB422795388GR","NB422801565GR","NB422804014GR","NB422809515GR","NB422809555GR",
      "NB422810916GR","NB422837777GR","NB422853911GR","NB422855078GR","NB422855081GR",
      "NB422855104GR","NB422859097GR","NB422883343GR","NB422887212GR","NB422855118GR",
      "NB422891662GR","NM940056753GR","NM940056767GR","NM940056775GR","NM940056784GR",
      "NM940056798GR","NB422925216GR","NB422971326GR","NB423116419GR","NB423116440GR",
      "NB423150494GR","NB423150582GR","NB423215822GR","NB423248998GR","NB423249931GR",
      "NB423116405GR","NB423116467GR","NB423150463GR","NB423150534GR","NB423842172GR",
      "NB423870880GR","NB423871236GR","NB423890575GR","NB423894427GR","NB423975253GR",
      "NB423975275GR","NB423890907GR","NB423976903GR","NB423986260GR","NB423992795GR",
      "NB423992821GR","NB424026241GR","NB424034455GR","NB424038871GR","NB424039347GR",
      "NB424039364GR","NB424130828GR","NB424135604GR","NB424135621GR","NB424135635GR",
      "NB424160820GR","NB424196308GR","NB424207266GR","NB424207425GR","NB424209094GR",
      "NB424209103GR","NB424237197GR","NB424237926GR","NB424246865GR","NB424284869GR",
      "NB424285073GR","NB424289883GR","NB424297068GR","NB424299435GR","NB424308548GR",
      "NB424343567GR","NB424343575GR","NB424344275GR","NB424354255GR","NB424354281GR",
      "NB424355928GR","NB424448616GR","NB424461382GR","NB424498073GR","NB424506747GR",
      "NB424509955GR","NB424549084GR","NB424561385GR","NB424561417GR","NB424638853GR",
      "NM940057277GR","NM940057229GR","NM940057263GR","NM940057436GR","NM940057382GR",
      "NM940057396GR","NM940057515GR","NM940057949GR","NM940057970GR","NM940057983GR",
      "NM940057997GR","NM831297869GR","NM940057215GR","NM940057246GR","NM940057250GR",
      "NM940057498GR","NM940057317GR","NM940057334GR","NM940057348GR","NM940057405GR",
      "NM940057422GR","NM940057467GR","NM940057538GR","NM940057555GR","NM940057612GR",
      "NM940057626GR","NM940057643GR","NM940057657GR","NM940057674GR","NM940057921GR",
      "NM940057966GR","NO810116977GR","NO810116963GR","NO810116929GR","NO810116950GR",
      "NO810116708GR","NO810116915GR","NO810117059GR"
    ]);

    const scanInput = document.getElementById("scanInput");
    const resultBox = document.getElementById("resultBox");
    const details = document.getElementById("details");
    const historyList = document.getElementById("historyList");
    const liveBuffer = document.getElementById("liveBuffer");

    const checkBtn = document.getElementById("checkBtn");
    const clearBtn = document.getElementById("clearBtn");
    const focusBtn = document.getElementById("focusBtn");
    const testBtn = document.getElementById("testBtn");

    let historyItems = [];
    let wedgeBuffer = "";
    let wedgeTimer = null;

    function normalizeCode(value) {
      return String(value || "").replace(/\s+/g, "").trim().toUpperCase();
    }

    function focusInput() {
      scanInput.focus();
      scanInput.select();
    }

    function setNeutral(text) {
      resultBox.className = "result neutral";
      resultBox.textContent = text;
    }

    function clearInput() {
      scanInput.value = "";
      wedgeBuffer = "";
      liveBuffer.textContent = "—";
      details.textContent = "";
      setNeutral("Περίμενω scan...");
      focusInput();
    }

    function renderHistory() {
      if (historyItems.length === 0) {
        historyList.innerHTML = '<div class="history-item small">Δεν υπάρχουν scans ακόμα.</div>';
        return;
      }

      historyList.innerHTML = historyItems.map(item => `
        <div class="history-item">
          <div><strong>${item.code}</strong></div>
          <div>
            <span class="${item.found ? 'ok' : 'bad'}">${item.found ? 'ΕΠΙΣΤΡΟΦΗ' : 'ΟΧΙ ΕΠΙΣΤΡΟΦΗ'}</span>
            <span class="small"> — ${item.time}</span>
          </div>
        </div>
      `).join("");
    }

    function addHistory(code, found) {
      const time = new Date().toLocaleTimeString("el-GR");
      historyItems.unshift({ code, found, time });
      if (historyItems.length > 15) historyItems.length = 15;
      renderHistory();
    }

    function showResult(code) {
      const normalized = normalizeCode(code);

      if (!normalized) {
        setNeutral("Δώσε ή σκάναρε κωδικό");
        details.textContent = "";
        return;
      }

      const found = trackingNumbers.has(normalized);

      if (found) {
        resultBox.className = "result yes";
        resultBox.textContent = "ΕΠΙΣΤΡΟΦΗ";
      } else {
        resultBox.className = "result no";
        resultBox.textContent = "ΟΧΙ ΕΠΙΣΤΡΟΦΗ";
      }

      details.textContent = "Tracking Number: " + normalized;
      addHistory(normalized, found);

      scanInput.value = "";
      wedgeBuffer = "";
      liveBuffer.textContent = "—";
      focusInput();
    }

    function checkCode() {
      const code = normalizeCode(scanInput.value || wedgeBuffer);
      showResult(code);
    }

    checkBtn.addEventListener("click", checkCode);

    clearBtn.addEventListener("click", clearInput);

    focusBtn.addEventListener("click", focusInput);

    testBtn.addEventListener("click", function () {
      alert("Το JavaScript δουλεύει κανονικά.");
    });

    scanInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        e.preventDefault();
        checkCode();
      }
    });

    scanInput.addEventListener("input", function () {
      const code = normalizeCode(scanInput.value);
      liveBuffer.textContent = code || "—";

      clearTimeout(wedgeTimer);
      wedgeTimer = setTimeout(function () {
        if (code.length >= 10) {
          showResult(code);
        }
      }, 150);
    });

    document.addEventListener("keydown", function (e) {
      const activeIsInput = document.activeElement === scanInput;

      if (activeIsInput) return;

      if (e.key === "Enter") {
        if (wedgeBuffer.length > 0) {
          e.preventDefault();
          showResult(wedgeBuffer);
        }
        return;
      }

      if (e.key.length === 1) {
        wedgeBuffer += e.key;
        liveBuffer.textContent = normalizeCode(wedgeBuffer) || "—";

        clearTimeout(wedgeTimer);
        wedgeTimer = setTimeout(function () {
          const code = normalizeCode(wedgeBuffer);
          if (code.length >= 10) {
            showResult(code);
          }
        }, 150);
      }
    });

    document.addEventListener("click", function () {
      focusInput();
    });

    window.addEventListener("load", function () {
      focusInput();
      setNeutral("Περίμενω scan...");
    });
  </script>
</body>
</html>
